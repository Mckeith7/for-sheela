<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sheela ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="mary_spin.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div id="intro-screen">
            <img src="audi_intro.jpg" class="intro-img">
            <h1>Something Sleek...</h1>
            <button onclick="startExperience()" id="start-btn">Begin</button>
        </div>

        <div id="main-content" style="display:none;">
            <h1 class="birthday-title">Happy Birthday, Sheela 🎂</h1>
            
            <div class="image-grid">
                <img src="mary1.jpg" class="grid-pic">
                <img src="mary2.jpg" class="grid-pic">
                <img src="mary3.jpg" class="grid-pic">
                <img src="mary4.jpg" class="grid-pic">
            </div>

            <div class="letter-box">
                <p>Honestly, I was deep in my terminal tonight, but the logic kept leading back to you.</p>
                <p>I scripted something that reminded me of you today. Sleek, mysterious, and definitely has that birthday energy. 😉</p>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop><source src="birthday_song.mp3" type="audio/mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
