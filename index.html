<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Sheela ✨</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        #bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1; filter: brightness(0.35);
        }

        .container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; padding: 20px; text-align: center;
            position: relative; z-index: 10;
        }

        .intro-img, .profile-img {
            width: 260px; height: 350px; object-fit: cover;
            border-radius: 20px; border: 2px solid white; margin-bottom: 15px;
        }

        #start-btn {
            background: #fff; color: #000; padding: 15px 40px;
            border-radius: 30px; font-weight: bold; border: none; cursor: pointer;
            box-shadow: 0 0 20px rgba(255,255,255,0.4); font-size: 1.1rem;
        }

        .letter-box {
            background: rgba(0,0,0,0.8); padding: 20px;
            border-radius: 15px; max-width: 340px; font-size: 0.95rem; line-height: 1.5;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="mary_spin.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div id="intro-screen">
            <img src="audi_intro.jpg" class="intro-img">
            <h1>Something Sleek...</h1>
            <button onclick="startExperience()" id="start-btn">Begin</button>
        </div>

        <div id="main-content" class="hidden">
            <h1 style="margin-top: 0;">Happy Birthday, Sheela 🎂</h1>
            <img src="mary1.jpg" id="slideshow" class="profile-img">
            <div class="letter-box">
                <p>Honestly, I was deep in my terminal tonight, but the logic kept leading back to you.</p>
                <p>I scripted something that reminded me of you today. Sleek and mysterious. 😉</p>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop><source src="birthday_song.mp3" type="audio/mp3"></audio>

    <script>
        let currentPhoto = 1;
        function startSlideshow() {
            setInterval(() => {
                currentPhoto++;
                if (currentPhoto > 4) currentPhoto = 1;
                const img = document.getElementById('slideshow');
                if(img) img.src = `mary${currentPhoto}.jpg`;
            }, 3000);
        }

        function startExperience() {
            console.log("Starting...");
            // Music
            const song = document.getElementById('bg-music');
            if(song) { song.volume = 0.2; song.play(); }

            // Voice
            const text = "Happy Birthday, Sheela. I was deep in my terminal tonight, but the logic kept leading back to you. I accidentally scripted something that reminded me of you today.";
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'en-US';
            speech.rate = 0.85;
            window.speechSynthesis.speak(speech);

            // UI Swap
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            startSlideshow();
        }
    </script>
</body>
</html>
